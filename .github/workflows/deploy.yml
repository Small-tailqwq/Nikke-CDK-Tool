name: Deploy to GitHub Pages

on:
  push:
    branches:
      - masrer

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Copy index.html to 404.html
        run: cp dist/index.html dist/404.html

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean: true
          commit-message: |
            🚀 Deploy: ${{ github.workflow }} @ ${{ github.sha }}

            
      - name: Detect cdk-list.json changes
        id: cdk_changed
        shell: bash
        run: |
          if git diff --name-only "$(git rev-parse HEAD^)" HEAD | grep -q '^public/cdk-list\.json$'; then
            echo "changed=true"  >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Purge jsDelivr cache
        if: ${{ steps.cdk_changed.outputs.changed == 'true' }}
        run: |
          echo "🔄  cdk-list.json changed, purging jsDelivr cache…"
          curl -sSf "https://purge.jsdelivr.net/gh/Small-tailqwq/Nikke-CDK-Tool@masrer/public/cdk-list.json" \
            && echo "✅  jsDelivr cache purged."
