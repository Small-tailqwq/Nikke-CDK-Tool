name: 部署到GitHub Pages

on:
  push:
    branches:
      - masrer

permissions:
  contents: write
  deployments: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: 构建和部署

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 设置Node.js环境
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: 安装依赖
        run: |
          # npm 内置重试参数：最多 5 次请求重试，指数退避，降低临时网络抖动影响
          npm config set fetch-retries 5
          npm config set fetch-retry-factor 2
          npm config set fetch-retry-mintimeout 10000
          npm config set fetch-retry-maxtimeout 60000

          # 兼容 package-lock.json 中历史镜像地址，统一使用 npm 官方源
          if [ -f package-lock.json ]; then
            tmp_lockfile="$(mktemp)"
            sed 's#https\?://mirrors.cloud.tencent.com/npm/#https://registry.npmjs.org/#g' package-lock.json > "$tmp_lockfile" \
              && mv "$tmp_lockfile" package-lock.json \
              || { rm -f "$tmp_lockfile"; echo "package-lock.json 镜像地址替换失败"; exit 1; }
          fi

          npm ci --no-audit

      - name: 构建项目
        run: npm run build

      - name: 复制首页文件用于SPA路由支持
        run: cp dist/index.html dist/404.html

      - name: 部署到GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean: true
          commit-message: |
            🚀 部署: ${{ github.workflow }} @ ${{ github.sha }}

      - name: 清理老旧Deployment
        run: |
          echo "正在检查需要清理的deployments..."

          # 获取所有deployments，按创建时间倒序排列，跳过前5个
          deployments=$(gh api repos/${{ github.repository }}/deployments --jq '.[5:] | .[] | .id' 2>/dev/null || echo "")

          if [ -z "$deployments" ]; then
            echo "没有需要清理的deployments（总数小于等于5个）"
            exit 0
          fi

          echo "发现需要清理的deployments，开始处理..."

          for deployment_id in $deployments; do
            echo "处理deployment: $deployment_id"
            
            # 先将deployment状态设置为inactive
            gh api repos/${{ github.repository }}/deployments/$deployment_id/statuses \
              -f state=inactive \
              -f description="由CI自动清理" \
              --silent || echo "设置inactive状态失败，继续尝试删除"
            
            # 删除deployment
            if gh api -X DELETE repos/${{ github.repository }}/deployments/$deployment_id --silent; then
              echo "✅ 成功删除deployment: $deployment_id"
            else
              echo "❌ 删除deployment失败: $deployment_id"
            fi
          done

          echo "✨ Deployment清理完成，已保留最近5个deployment"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
