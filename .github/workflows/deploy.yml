name: 部署到GitHub Pages

on:
  push:
    branches:
      - masrer

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: 构建和部署

    steps:
      - name: 检出代码
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: 设置Node.js环境
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 构建项目
        run: npm run build

      - name: 复制首页文件用于SPA路由支持
        run: cp dist/index.html dist/404.html

      - name: 部署到GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean: true
          commit-message: |
            🚀 部署: ${{ github.workflow }} @ ${{ github.sha }}
