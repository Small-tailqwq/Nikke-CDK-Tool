<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TencentCaptcha Debug</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: #101418;
        color: #eef3f7;
      }

      main {
        box-sizing: border-box;
        width: min(860px, 100%);
        margin: 0 auto;
        padding: 32px 18px;
      }

      h1 {
        margin: 0 0 18px;
        font-size: 24px;
        font-weight: 700;
        letter-spacing: 0;
      }

      .toolbar {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto auto;
        gap: 10px;
        align-items: end;
        margin-bottom: 18px;
      }

      label {
        display: grid;
        gap: 6px;
        font-size: 13px;
        color: #b8c4cf;
      }

      input,
      button {
        box-sizing: border-box;
        height: 38px;
        border-radius: 6px;
        font: inherit;
      }

      input {
        width: 100%;
        border: 1px solid #34424f;
        background: #151c23;
        color: #eef3f7;
        padding: 0 12px;
      }

      button {
        border: 1px solid #3b82f6;
        background: #2563eb;
        color: white;
        padding: 0 14px;
        cursor: pointer;
      }

      button.secondary {
        border-color: #405160;
        background: #1b2630;
      }

      button:disabled {
        opacity: 0.6;
        cursor: wait;
      }

      pre {
        min-height: 280px;
        overflow: auto;
        border: 1px solid #2f3e4a;
        border-radius: 6px;
        background: #0b0f13;
        color: #dbe7ef;
        padding: 14px;
        white-space: pre-wrap;
        word-break: break-word;
      }

      @media (max-width: 640px) {
        .toolbar {
          grid-template-columns: 1fr;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>TencentCaptcha Debug</h1>
      <div class="toolbar">
        <label>
          App ID
          <input id="appid" value="188981228" />
        </label>
        <button id="open">Open Captcha</button>
        <button id="copy" class="secondary">Copy JSON</button>
      </div>
      <pre id="output">Ready.</pre>
    </main>

    <script>
      const sdkUrl = "https://global.captcha.gtimg.com/TCaptcha-global.js";
      const output = document.querySelector("#output");
      const openButton = document.querySelector("#open");
      const copyButton = document.querySelector("#copy");
      const appidInput = document.querySelector("#appid");

      window.__tcaptchaLastResult = null;

      // ⚠️  captcha 票据 (ticket/randstr) 具有时效性但属于敏感会话材料。
      // 不要在共享屏幕、录屏、或公开场合使用此页面。
      // 使用后请清除页面显示内容 (Ctrl+R 刷新)。

      function print(value) {
        const text =
          typeof value === "string" ? value : JSON.stringify(value, null, 2);
        output.textContent = text;
        // 不输出到 console 以避免终端/日志采集泄露票据
      }

      function loadSdk() {
        if (window.TencentCaptcha) {
          return Promise.resolve();
        }

        return new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src = sdkUrl;
          script.async = true;
          script.onload = () => resolve();
          script.onerror = () =>
            reject(new Error(`Failed to load ${sdkUrl}`));
          document.head.appendChild(script);
        });
      }

      async function openCaptcha() {
        openButton.disabled = true;
        try {
          const appid = appidInput.value.trim();
          if (!appid) {
            throw new Error("appid is required");
          }

          await loadSdk();
          const captcha = new window.TencentCaptcha(
            appid,
            (result) => {
              window.__tcaptchaLastResult = result;
              print({
                appid,
                result,
                usefulForLogin:
                  result && result.ret === 0
                    ? {
                        ticket: result.ticket,
                        randstr: result.randstr,
                        captchaAppId: appid,
                      }
                    : null,
              });
            },
            { type: "popup" },
          );

          captcha.show();
          print({ status: "captcha opened", appid });
        } catch (error) {
          print({ error: error && error.message ? error.message : String(error) });
        } finally {
          openButton.disabled = false;
        }
      }

      async function copyJson() {
        const text = output.textContent || "";
        await navigator.clipboard.writeText(text);
      }

      openButton.addEventListener("click", openCaptcha);
      copyButton.addEventListener("click", copyJson);
    </script>
  </body>
</html>
